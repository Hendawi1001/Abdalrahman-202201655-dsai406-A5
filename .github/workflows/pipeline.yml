name: ML Validate and Deploy Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install mlflow dvc scikit-learn pandas

      - name: Pull data with DVC
        run: dvc pull

      - name: Train model and log to MLflow
        run: python train.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      - name: Verify model_info.txt was created
        run: |
          if [ ! -f model_info.txt ]; then
            echo "model_info.txt not found - training step must have failed."
            exit 1
          fi
          echo "Run ID: $(cat model_info.txt)"

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          retention-days: 7

  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install mlflow

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .

      - name: Display Run ID
        run: echo "Deploying Run ID: $(cat model_info.txt)"

      - name: Check accuracy threshold
        run: python check_threshold.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      - name: Mock Docker build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          docker build --build-arg RUN_ID=$RUN_ID -t ml-model:$RUN_ID .
          echo "Docker image built successfully."
