name: ML Validate and Deploy Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  linter:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linter
        run: pip install flake8

      - name: Run linter
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: linter
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install mlflow dvc dvc-s3 scikit-learn pandas

      - name: Configure DVC remote credentials
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.DVC_REMOTE_USER }}
          dvc remote modify origin --local password ${{ secrets.DVC_REMOTE_PASSWORD }}

      - name: Pull data with DVC
        run: dvc pull

      - name: Train model and log to MLflow
        env:
          MLFLOW_TRACKING_URI: "${{ secrets.MLFLOW_TRACKING_URI }}"
          MLFLOW_TRACKING_USERNAME: "${{ secrets.DVC_REMOTE_USER }}"
          MLFLOW_TRACKING_PASSWORD: "${{ secrets.DVC_REMOTE_PASSWORD }}"

        run: python train.py 2> error_logs.txt

      - name: Verify model_info.txt was created
        run: |
          if [ ! -f model_info.txt ]; then
            echo "model_info.txt not found - training step must have failed." >> error_logs.txt
            exit 1
          fi
          echo "Run ID: $(cat model_info.txt)"

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          retention-days: 7

      - name: Finalize Error Logs
        if: failure()
        run: |
          echo "--- Error Details ---" >> error_logs.txt
          echo "Job failed at step: ${{ github.action }}" >> error_logs.txt

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt
          retention-days: 7

      - name: Cleanup temporary cloud volumes
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."

  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install mlflow

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .

      - name: Check accuracy threshold
        env:
          MLFLOW_TRACKING_URI: "${{ secrets.MLFLOW_TRACKING_URI }}"
          MLFLOW_TRACKING_USERNAME: "${{ secrets.DVC_REMOTE_USER }}"
          MLFLOW_TRACKING_PASSWORD: "${{ secrets.DVC_REMOTE_PASSWORD }}"
        run: python check_threshold.py

      - name: Mock Docker build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: ${RUN_ID}"
          docker build --build-arg RUN_ID=${RUN_ID} -t ml-model:${RUN_ID} .
          echo "Docker image built successfully."
