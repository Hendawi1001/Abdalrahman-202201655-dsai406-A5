name: Model Validation and Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  validate:
    name: Train and Validate Model
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dvc dvc-s3 mlflow scikit-learn pandas 

      - name: Pull Data with DVC
        run: dvc pull
        
      - name: Train Model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python train.py

      - name: Persist Run ID Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-run-info
          path: model_info.txt
          retention-days: 1

  deploy:
    name: Deploy to Docker
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install MLflow
        run: pip install mlflow

      - name: Download Run ID Artifact
        uses: actions/download-artifact@v4
        with:
          name: model-run-info

      - name: Check Accuracy Threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          # This script will exit with code 1 (failing the job) if accuracy < 0.85
          python check_threshold.py

      - name: Mock Docker Build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          
          # The actual docker build command:
          docker build --build-arg RUN_ID=$RUN_ID -t my-classifier:latest .
